version: '3.8'

services:
  app:
    build: .
    container_name: multi-agent-research-assistant
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      - .:/app

  tests:
    build: .
    container_name: multi-agent-research-assistant-tests
    env_file:
      - .env
    volumes:
      - .:/app
    command: ["sh", "-c", "pip install -r requirements-dev.txt && pytest tests/ -v"]
